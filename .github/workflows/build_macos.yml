name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install VLC
      run: |
        brew install --cask vlc
        # 验证路径
        ls -la /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib
        ls -la /Applications/VLC.app/Contents/MacOS/plugins/

    - name: Clean previous builds
      run: rm -rf dist build

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build app
      run: |
        pyinstaller --clean musicdlgui.spec

    - name: Create DMG
      run: |
        mkdir -p dmg_staging
        cp -R "dist/${{ env.APP_NAME }}.app" dmg_staging/
        ln -s /Applications dmg_staging/Applications
        hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder dmg_staging -ov -format UDZO "dist/${{ env.APP_NAME }}.dmg"
      env:
        APP_NAME: Music-spd-tool_macos-arm64

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: MusicDownloader-macOS
        path: dist/Music-spd-tool_macos-arm64.dmg

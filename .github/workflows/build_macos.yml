name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install VLC and FFmpeg
      run: |
        brew install --cask vlc
        brew install ffmpeg

        VLC_LIB="/Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib"
        if [ -f "$VLC_LIB" ]; then
          echo "VLC installed successfully: $VLC_LIB"
        else
          echo "VLC library not found at expected location!"
          exit 1
        fi

        FFMPEG_BIN="$(brew --prefix ffmpeg)/bin/ffmpeg"
        if [ -f "$FFMPEG_BIN" ]; then
          echo "FFmpeg installed at: $FFMPEG_BIN"
        else
          echo "FFmpeg not found!"
          exit 1
        fi

    - name: Clean previous builds
      run: |
        rm -rf dist build
        # 注意：不要删除 *.spec 文件，保留源码中的 spec 文件
        # 如果之前生成过临时的 spec 文件，只删除这些临时文件（如果有的话）
        # 但为了保险，我们只删除 dist 和 build

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build macOS app with PyInstaller
      env:
        VLC_PREFIX: /Applications/VLC.app/Contents/MacOS
        FFMPEG_PREFIX: $(brew --prefix ffmpeg)
      run: |
        pyinstaller --clean musicdlgui.spec

    - name: Create DMG installer
      env:
        APP_NAME: Music-spd-tool_macos-arm64
      run: |
        mkdir -p dmg_staging
        cp -R "dist/${APP_NAME}.app" dmg_staging/
        ln -s /Applications dmg_staging/Applications
        hdiutil create -volname "${APP_NAME}" -srcfolder dmg_staging -ov -format UDZO "dist/${APP_NAME}.dmg"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: MusicDownloader-macOS
        path: dist/Music-spd-tool_macos-arm64.dmg
        if-no-files-found: error

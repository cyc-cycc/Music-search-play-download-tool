name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install VLC and FFmpeg
      run: |
        # 安装 VLC（Cask 方式）和 FFmpeg（普通 formula）
        brew install --cask vlc
        brew install ffmpeg

        # 验证 VLC 安装（使用绝对路径）
        VLC_LIB="/Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib"
        if [ -f "$VLC_LIB" ]; then
          echo "VLC installed successfully: $VLC_LIB"
        else
          echo "VLC library not found at expected location!"
          exit 1
        fi

        # 验证 FFmpeg 安装
        FFMPEG_BIN="$(brew --prefix ffmpeg)/bin/ffmpeg"
        if [ -f "$FFMPEG_BIN" ]; then
          echo "FFmpeg installed at: $FFMPEG_BIN"
        else
          echo "FFmpeg not found!"
          exit 1
        fi

    - name: Clean previous builds
      run: |
        rm -rf dist build
        # 删除可能残留的 .spec 缓存（可选）
        rm -rf *.spec

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build macOS app with PyInstaller
      env:
        # 显式传递 VLC 路径（使用实际库目录）和 FFmpeg 前缀给 .spec
        VLC_PREFIX: /Applications/VLC.app/Contents/MacOS
        FFMPEG_PREFIX: $(brew --prefix ffmpeg)
      run: |
        pyinstaller --clean musicdlgui.spec

    - name: Create DMG installer
      env:
        APP_NAME: Music-spd-tool_macos-arm64
      run: |
        mkdir -p dmg_staging
        cp -R "dist/${APP_NAME}.app" dmg_staging/
        # 创建 Applications 快捷方式，方便拖拽安装
        ln -s /Applications dmg_staging/Applications
        # 生成 DMG（压缩只读格式）
        hdiutil create -volname "${APP_NAME}" -srcfolder dmg_staging -ov -format UDZO "dist/${APP_NAME}.dmg"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: MusicDownloader-macOS
        path: dist/Music-spd-tool_macos-arm64.dmg
        if-no-files-found: error
